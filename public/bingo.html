<script>
/* Trava real do Bingo: lê a liberação do servidor (admin) */
(function(){
  function check(){
    if(typeof API==='undefined' || !API.getSystemConfig){ setTimeout(check,150); return; }
    var role=(localStorage.getItem('tc_role')||'');
    if(['admin','supervisor'].includes(role)) return; // staff sempre acessa
    API.getSystemConfig().then(function(d){
      var on = d && d.config && d.config.bingo_enabled === 'true';
      try{ localStorage.setItem('tc_bingo_ativo', on?'1':'0'); }catch(e){}
      if(!on){ alert('O Bingo está fechado pelo administrador.'); window.location.replace('salas.html'); }
    }).catch(function(){});
  }
  check();
})();
</script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat Supremo Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f6fc;--surface:#ffffff;--surface2:#e8f2ff;--surface3:#dce6ff;
  --border:#c8d8f5;--border2:#8aaee0;
  --blue:#2563eb;--purple:#7c3aed;
  --gold:#f59e0b;--gold2:#d97706;
  --green:#10b981;--red:#ef4444;
  --text:#0f1f3d;--text2:#374d6e;--text3:#7a90b0;
  --radius:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;background:#0f1f3d;border-bottom:1px solid #5b21b6;
  flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.22);
}
.logo{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;
  color:#fff;white-space:nowrap}
.hbadge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;font-family:'Syne',sans-serif}
.hbadge.jogador{background:var(--surface2);color:var(--blue);border:1px solid var(--border2)}
.hbadge.operador{background:#fef3c7;color:var(--gold2);border:1px solid #fcd34d}
.hbadge.admin{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.hbtn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  transition:.15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.hbtn:hover{border-color:var(--blue);color:var(--blue);background:#dbeafe}
.hbtn.admin-on{border-color:var(--red);color:var(--red);background:#fee2e2}
.hbtn.op-on{border-color:var(--gold2);color:var(--gold2);background:#fef3c7}
.hbtn.sair{background:#ef4444;border-color:#ef4444;color:#fff}
.hbtn.sair:hover{background:#dc2626;border-color:#dc2626}

/* ── MAIN LAYOUT ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── LEFT: BINGO ── */
.bingo-col{display:flex;flex-direction:column;padding:12px 14px 8px;gap:10px;flex-shrink:0;background:var(--bg)}

/* Ball row */
.ball-row{display:flex;align-items:center;gap:12px;flex-shrink:0}
.ball{
  width:54px;height:54px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;
  box-shadow:0 4px 14px rgba(245,158,11,.35);transition:.3s;
}
.ball.empty{background:var(--surface3);box-shadow:none;color:var(--text3);font-size:18px;border:1.5px solid var(--border)}
.ball.pop{animation:ballPop .35s ease}
@keyframes ballPop{0%{transform:scale(.5)}60%{transform:scale(1.18)}100%{transform:scale(1)}}

.drawn-pills{display:flex;flex-wrap:wrap;gap:3px;flex:1;overflow:hidden;max-height:54px}
.pill{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
  background:var(--surface);border:1px solid var(--border);color:var(--text3);
  flex-shrink:0;
}
.pill.mine{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);color:#fff}

/* Cartela */
.cartela{
  background:var(--surface);
  border:1.5px solid var(--border);border-radius:var(--radius);padding:10px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(37,99,235,.06);
}
.cartela-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:280px;margin:0 auto}
.nc{
  width:48px;height:48px;border-radius:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);
  cursor:pointer;transition:.15s;user-select:none;
}
.nc:hover{border-color:var(--blue);transform:scale(1.06);background:var(--surface3)}
.nc.sorteado{border-color:var(--blue)!important;color:var(--blue)!important;background:var(--surface2)}
.nc.marcado{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border-color:var(--gold)!important;color:#fff!important;
  box-shadow:0 2px 8px rgba(245,158,11,.3);transform:scale(1.04);
}

/* Progress + bingo button row */
.prog-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-bar-wrap{flex:1;height:8px;background:var(--surface3);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:10px;transition:.35s}
.prog-lbl{font-size:11px;font-weight:700;color:var(--text3);white-space:nowrap}
.bingo-btn{display:none;padding:6px 16px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;cursor:pointer;
  animation:pulse .9s infinite;flex-shrink:0;box-shadow:0 3px 10px rgba(37,99,235,.3)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* Op controls strip */
.op-strip{display:none;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.op-strip.show{display:flex}
.obtn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.15s}
.obtn-start{background:var(--green);color:#fff;box-shadow:0 2px 6px rgba(16,185,129,.25)}
.obtn-draw{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.25)}
.obtn-reset{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.obtn:disabled{opacity:.35;cursor:default}
.speed-sel{background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:4px 8px;font-size:11px;font-family:'DM Sans',sans-serif}
.status-txt{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}

/* ── RIGHT: CHAT ── */
.chat-col{
  display:flex;flex-direction:column;
  border-top:1px solid var(--border);background:var(--surface);
  overflow:hidden;flex:1;min-height:0;
}
.chat-header{padding:10px 12px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;font-family:'Syne',sans-serif}
.chat-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:5px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.msg{display:flex;align-items:flex-start;gap:7px}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
  border:1px solid var(--border)}
.msg-body{flex:1;min-width:0}
.msg-nick{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:1px;font-family:'Syne',sans-serif}
.msg-nick.op{color:var(--gold2)}
.msg-nick.admin{color:var(--red)}
.msg-text{font-size:13px;color:var(--text);line-height:1.4;word-break:break-word}
.msg-system{font-size:10px;color:var(--text3);text-align:center;padding:3px 0;font-weight:700;
  background:var(--surface2);border-radius:20px;margin:2px 0}

.chat-input-row{
  display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)
}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:7px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;
}
.chat-input::placeholder{color:var(--text3)}
.chat-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2563eb18}
.chat-send{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
  background:var(--blue);color:#fff;font-size:15px;box-shadow:0 2px 6px rgba(37,99,235,.25)}
.chat-send:hover{background:var(--purple)}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,31,61,.6);z-index:200;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:24px;width:320px;max-width:92vw;text-align:center;
  box-shadow:0 8px 40px rgba(37,99,235,.12);
  animation:mIn .3s ease}
@keyframes mIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;color:var(--text)}
.modal p{font-size:12px;color:var(--text3);margin-bottom:14px}
.minput{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:8px}
.minput:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2563eb18}
.mbtn{width:100%;padding:9px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-top:4px}
.mbtn-ok{background:var(--blue);color:#fff}
.mbtn-ok:hover{background:var(--purple)}
.mbtn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:7px}
.merr{font-size:11px;color:var(--red);display:none;margin-bottom:6px}

/* Winner modal */
.wmodal{border-color:var(--gold);box-shadow:0 0 40px rgba(245,158,11,.2)}
.trophy{font-size:56px;animation:bounceT .8s infinite}
@keyframes bounceT{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Admin panel modal */
#adminPanelModal .modal{text-align:left;border-color:var(--red)}
.op-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.op-row:last-child{border:none}
.op-av{width:26px;height:26px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--border)}
.op-nick{font-size:12px;font-weight:700;flex:1;color:var(--text)}
.op-set{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;
  background:var(--blue);color:#fff}
.op-set.active{background:var(--green)}

/* Confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:300}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;
  background:var(--text);color:#fff;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}

/* All nums modal */
#numsModal .modal{max-width:500px;width:94vw;text-align:left}
.all-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.an{aspect-ratio:1;border-radius:7px;background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3)}
.an.drawn{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.25)}


</style>
<script>(function(){var l=location,w=l.protocol==='https:'?'wss:':'ws:';window.TC_API_URL=window.TC_API_URL||l.protocol+'//'+l.host+'/api';window.TC_WS_URL=window.TC_WS_URL||w+'//'+l.host+'/ws';})();</script>
<script src="api.js"></script>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- ══ HEADER ══ -->
<header>
  <img src="chat-supremo-logo.png" alt="Chat Supremo" style="height:40px;object-fit:contain">
  <span style="font-size:11px;color:#fff;font-weight:700">🎱 Bingo</span>
  <div class="header-actions">
    <button class="hbtn" id="btnNumsAll" onclick="openNumsModal()">🔢 Sorteados</button>
    <button class="hbtn" id="btnAdmin" onclick="openAdminLogin()" style="display:none">🔑 Admin</button>
    <button class="hbtn op-on" id="btnOpPanel" onclick="openAdminPanel()" style="display:none">⚙</button>
    <button class="hbtn sair" onclick="window.location.href='salas.html'">⏻ Sair</button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main>
  <!-- LEFT: BINGO -->
  <div class="bingo-col">

    <!-- Ball + últimos sorteados -->
    <div class="ball-row">
      <div class="ball empty" id="currentBall">—</div>
      <div class="drawn-pills" id="drawnPills"></div>
    </div>

    <!-- Op controls -->
    <div class="op-strip" id="opStrip">
      <select class="speed-sel" id="speedSel">
        <option value="0">Manual</option>
        <option value="5000">5s</option>
        <option value="3000" selected>3s</option>
        <option value="1500">1.5s</option>
      </select>
      <button class="obtn obtn-start" id="btnStart" onclick="startBingo()">▶ Iniciar</button>
      <button class="obtn obtn-draw" id="btnDraw" onclick="drawNumber()" disabled>🎱 Sortear</button>
      <button class="obtn obtn-reset" onclick="resetBingo()">↺</button>
      <span class="status-txt" id="statusTxt">Pronto</span>
    </div>

    <!-- Cartela -->
    <div class="cartela">
      <div class="cartela-grid" id="cartelaGrid"></div>
    </div>

    <!-- Progress -->
    <div class="prog-row">
      <div class="prog-bar-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <span class="prog-lbl" id="progLbl">0/20</span>
      <button class="bingo-btn" id="bingoBtn" onclick="declareBingo()">🎉 BINGO!</button>
    </div>

  </div>

  <!-- RIGHT: CHAT -->
  <div class="chat-col">
    <div class="chat-header"><div class="chat-dot"></div> CHAT AO VIVO</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Digite uma mensagem..." maxlength="200"
        onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="chat-send" onclick="sendMsg()">➤</button>
    </div>
  </div>
</main>

<!-- ══ MODALS ══ -->

<!-- Admin login -->
<div class="overlay" id="adminLoginModal">
  <div class="modal">
    <div style="font-size:32px;margin-bottom:8px">🔐</div>
    <h3 style="color:var(--red);font-family:'Syne',sans-serif">Área Admin</h3>
    <p>Digite a senha de administrador</p>
    <div class="merr" id="adminErr">Senha incorreta!</div>
    <input type="password" class="minput" id="adminPass" placeholder="Senha..."
      onkeydown="if(event.key==='Enter')confirmAdmin()"/>
    <button class="mbtn mbtn-ok" onclick="confirmAdmin()">Entrar</button>
    <button class="mbtn mbtn-cancel" onclick="closeOverlay('adminLoginModal')">Cancelar</button>
  </div>
</div>

<!-- Admin panel -->
<div class="overlay" id="adminPanelModal">
  <div class="modal" style="text-align:left;border-color:var(--red)">
    <h3 style="color:var(--red);margin-bottom:4px;font-family:'Syne',sans-serif;font-size:18px">🔑 Painel Admin</h3>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px">Defina quem será o operador do bingo</p>
    <div id="adminOpList">
      <div class="op-row">
        <div class="op-av">😊</div>
        <div class="op-nick">Você</div>
        <button class="op-set" id="opBtn_voce" onclick="setOperator('voce','Você')">Definir</button>
      </div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text2)">
      Operador atual: <strong id="curOpLabel" style="color:var(--gold)">Nenhum</strong>
    </div>
    <div style="display:flex;gap:6px;margin-top:12px">
      <button class="mbtn mbtn-ok" style="padding:8px" onclick="closeOverlay('adminPanelModal')">Fechar</button>
      <button class="mbtn mbtn-cancel" style="padding:8px" onclick="logoutAdmin()">Sair do Admin</button>
    </div>
  </div>
</div>

<!-- All numbers modal -->
<div class="overlay" id="numsModal">
  <div class="modal">
    <h3 style="font-family:'Syne',sans-serif;color:var(--blue)">🔢 Números Sorteados</h3>
    <div class="all-grid" id="allGrid"></div>
    <button class="mbtn mbtn-ok" style="margin-top:14px;padding:8px" onclick="closeOverlay('numsModal')">Fechar</button>
  </div>
</div>

<!-- Winner modal -->
<div class="overlay" id="winnerModal">
  <div class="modal wmodal">
    <div class="trophy">🏆</div>
    <h3 style="font-family:'Syne',sans-serif;font-size:28px;
      background:linear-gradient(135deg,var(--gold),var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">BINGO!</h3>
    <p id="winnerText" style="margin-bottom:16px">Parabéns!</p>
    <button class="mbtn mbtn-ok" onclick="closeOverlay('winnerModal')">🎊 Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ─── VERIFICAÇÃO DE ACESSO ─────────────────────────────────
const _TOKEN_BINGO = (function(){try{return localStorage.getItem('tc_token')||'';}catch(e){return '';}})();
if (!_TOKEN_BINGO) {
  document.addEventListener('DOMContentLoaded', function() {
    const aviso = document.createElement('div');
    aviso.style.cssText = 'position:fixed;inset:0;background:rgba(15,31,61,.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
    aviso.innerHTML = `<div style="background:#fff;border-radius:16px;padding:28px 24px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(37,99,235,.15)">
      <div style="font-size:40px;margin-bottom:12px">🔐</div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#0f1f3d;margin-bottom:8px">Acesso Restrito</div>
      <p style="font-size:12px;color:#374d6e;margin-bottom:18px;line-height:1.6">Esta página é exclusiva para <strong>usuários cadastrados</strong>.<br>Faça seu cadastro ou entre na sua conta para continuar.</p>
      <div style="display:flex;gap:8px">
        <button onclick="window.location.href='salas.html'" style="flex:1;padding:10px;border-radius:8px;border:1px solid #c8d8f5;background:#f0f6fc;color:#374d6e;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">← Voltar</button>
        <button onclick="window.location.href='login.html'" style="flex:1;padding:10px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif">Entrar / Cadastrar</button>
      </div>
    </div>`;
    document.body.appendChild(aviso);
  });
}

// ══ STATE ════════════════════════════════════════════════
let isAdmin = false, isOperator = false;
let gameStarted = false;
let drawn = [], marked = new Set(), myCard = [];
let autoTimer = null;
const _LS_BINGO = {get:(k,d='')=>{try{return localStorage.getItem(k)||d;}catch(e){return d;}}};
const ME = {nick: _LS_BINGO.get('tc_nick','Você'), av: _LS_BINGO.get('tc_avatar','😊'), role: _LS_BINGO.get('tc_role','guest')};

// ══ VISITANTE — só visualiza ══════════════════════════════
const IS_GUEST_BINGO = ME.role === 'guest';
if(IS_GUEST_BINGO){
  document.addEventListener('DOMContentLoaded', function(){
    // Banner de aviso no topo da cartela
    const banner = document.createElement('div');
    banner.id = 'guestBanner';

// ══ INIT ══════════════════════════════════════════════════
function genCard(){
  const a=[];
  while(a.length<15){ const n=Math.floor(Math.random()*75)+1; if(!a.includes(n))a.push(n); }
  return a.sort((x,y)=>x-y);
}

function buildCard(){
  myCard = genCard();
  const g = document.getElementById('cartelaGrid');
  g.innerHTML='';
  myCard.forEach(n=>{
    const d=document.createElement('div');
    d.className='nc'; d.textContent=n; d.id='nc_'+n;
    d.onclick=()=>markNum(n);
    g.appendChild(d);
  });
}

function buildAllGrid(){
  const g=document.getElementById('allGrid'); g.innerHTML='';
  if(!drawn.length){
    g.innerHTML='<div style="color:var(--text2);font-size:13px;grid-column:1/-1;text-align:center;padding:16px">Nenhum número sorteado ainda</div>';
    return;
  }
  // Show only drawn numbers in order
  [...drawn].forEach(n=>{
    const d=document.createElement('div');
    d.className='an drawn'; d.textContent=n; g.appendChild(d);
  });
}

buildAllGrid();

}

function setOperator(id, name){

function showOpStrip(){ if(isAdmin) document.getElementById('opStrip').classList.add('show'); }
function hideOpStrip(){ document.getElementById('opStrip').classList.remove('show'); }

function updateBadge(){
  const b=document.getElementById('roleBadge');
  if(isAdmin&&isOperator){ b.textContent='ADMIN+OPERADOR'; b.className='hbadge admin'; }
  else if(isAdmin){ b.textContent='ADMIN'; b.className='hbadge admin'; }

// ══ BINGO ════════════════════════════════════════════════
function startBingo(){
  if(!isOperator){showToast('Apenas o operador pode iniciar!');return;}
  if(window.API){ API.bingo.start().catch(function(e){ showToast(e.message||'Erro ao iniciar'); }); }
}

function drawNumber(){
  if(!isOperator){showToast('Apenas o operador pode sortear!');return;}
  if(window.API){ API.bingo.draw().catch(function(e){ showToast(e.message||'Erro ao sortear'); }); }
}
function renderDraw(n){
  if(!drawn.includes(n)) drawn.push(n);
  var ball=document.getElementById('currentBall');
  ball.textContent=n; ball.className='ball pop';
  setTimeout(function(){ball.className='ball';},400);
  var ag=document.getElementById('ag_'+n); if(ag) ag.classList.add('drawn');
  if(myCard.includes(n)){ var nc=document.getElementById('nc_'+n); if(nc) nc.classList.add('sorteado'); }
  var pills=document.getElementById('drawnPills');
  var p=document.createElement('div'); p.className='pill'+(myCard.includes(n)?' mine':''); p.textContent=n; pills.prepend(p);
  while(pills.children.length>14) pills.removeChild(pills.lastChild);
  document.getElementById('statusTxt').textContent=drawn.length+'/75 sorteados';
}

function markNum(n){
  if(IS_GUEST_BINGO){showToast('👁 Visitantes só podem visualizar. Cadastre-se para jogar!');return;}
  if(!gameStarted){showToast('Aguarde o início!');return;}
  if(!drawn.includes(n)){showToast(`Nº ${n} ainda não foi sorteado!`);return;}
  if(marked.has(n)) marked.delete(n);
  else marked.add(n);
  const nc=document.getElementById('nc_'+n);
  if(nc) nc.classList.toggle('marcado',marked.has(n));
  updateProg();
  document.getElementById('bingoBtn').style.display=marked.size===15?'block':'none';
}

function declareBingo(){
  if(window.API){ API.bingo.claim().catch(function(e){ showToast(e.message||'Ainda não!'); }); }
}

function endGame(winner){
  if(!gameStarted)return;
  gameStarted=false; clearInterval(autoTimer);
  document.getElementById('btnDraw').disabled=true;
  document.getElementById('statusTxt').textContent='Encerrado';
  document.getElementById('winnerText').textContent=
    winner==='Você'?'Parabéns! Você venceu o bingo! 🏆':`${winner} venceu o bingo! 🏆`;
  document.getElementById('winnerModal').classList.add('show');
  sysMsg(`🏆 ${winner} fez BINGO e venceu!`);
  launchConfetti();
}

function resetBingo(){
  if(!isOperator){showToast('Apenas o operador pode reiniciar!');return;}
  if(window.API){ API.bingo.reset().catch(function(e){ showToast(e.message||'Erro'); }); }
}
function resetLocalUI(){
  clearInterval(autoTimer); gameStarted=false; drawn=[]; marked=new Set();
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnDraw').disabled=true;
  document.getElementById('currentBall').textContent='—';
  document.getElementById('currentBall').className='ball empty';
  document.getElementById('drawnPills').innerHTML='';
  document.getElementById('bingoBtn').style.display='none';
  document.getElementById('statusTxt').textContent='Pronto';
  buildCard(); buildAllGrid(); updateProg();
}

function updateProg(){
  const p=marked.size;
  document.getElementById('progFill').style.width=(p/15*100)+'%';
  document.getElementById('progLbl').textContent=p+'/15';
}

// ══ CHAT ═════════════════════════════════════════════════
const chatColors={
  'Você':'var(--blue)', 'SISTEMA':'var(--text3)',
  'DJMaster':'var(--purple)', 'Mari_s':'#db2777', 'Gamer123':'var(--blue)'
};

function sysMsg(text){
  const box=document.getElementById('chatMessages');
  const d=document.createElement('div');
  d.className='msg-system'; d.textContent=text;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}

function addChatMsg(nick, av, text, role=''){
  const box=document.getElementById('chatMessages');
  const m=document.createElement('div');
  m.className='msg';
  const color=chatColors[nick]||'var(--blue)';
  const roleClass=role==='admin'?'admin':role==='operador'?'op':'';
  m.innerHTML=`<div class="msg-av">${av}</div>
    <div class="msg-body">
      <div class="msg-nick ${roleClass}" style="color:${color}">${nick}</div>
      <div class="msg-text">${text}</div>
    </div>`;
  box.appendChild(m); box.scrollTop=box.scrollHeight;
}

function sendMsg(){
  if(IS_GUEST_BINGO){showToast('👁 Visitantes não podem enviar mensagens.');return;}
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim(); if(!txt)return;
  inp.value='';
  const role=isAdmin&&isOperator?'admin':isOperator?'operador':isAdmin?'admin':'';
  addChatMsg(ME.nick, ME.av, txt, role);
  // Simulate reply after 2-4s
  simulateReply(txt);
}

const botReplies=[
  ['Boa sorte! 🍀','🎮','Gamer123'],
  ['Quase lá! 💪','🌸','Mari_s'],
  ['Vamos lá! 🎉','🎧','DJMaster'],

  ['Alguém perto do bingo? 👀','🌸','Mari_s'],

}

// ══ CONFETTI ══════════════════════════════════════════════
function launchConfetti(){
  const cv=document.getElementById('confetti');
  cv.width=innerWidth; cv.height=innerHeight;
  const ctx=cv.getContext('2d');
  const pts=Array.from({length:120},()=>({
    x:Math.random()*cv.width,y:-10,r:4+Math.random()*7,
    color:['#ffd700','#ff4ecd','#00e5ff','#00e676','#ff5252'][Math.floor(Math.random()*5)],
    vx:(Math.random()-.5)*3,vy:2+Math.random()*3,
    rot:Math.random()*360,vr:(Math.random()-.5)*5,rect:Math.random()>.5
  }));
  let fr;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      p.rect?ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r):(ctx.beginPath(),ctx.arc(0,0,p.r,0,Math.PI*2),ctx.fill());
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      if(p.y>cv.height)p.y=-10;
    });
    fr=requestAnimationFrame(draw);
  })();
  setTimeout(()=>{cancelAnimationFrame(fr);ctx.clearRect(0,0,cv.width,cv.height);},5000);
}

// ══ TOAST ══════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._x);t._x=setTimeout(()=>t.style.opacity='0',2500);
}

<script src="api.js"></script>
<script>
/* === Bingo: integração com servidor (tempo real) === */
(function(){
  if(typeof API==='undefined' || !window.tcSocket) return;
  function renderCardGrid(card){
    myCard=card.slice(); var g=document.getElementById('cartelaGrid'); if(!g) return; g.innerHTML='';
    myCard.forEach(function(n){ var d=document.createElement('div'); d.className='nc'; d.textContent=n; d.id='nc_'+n; d.onclick=function(){markNum(n);}; if(drawn.includes(n)) d.classList.add('sorteado'); if(marked.has(n)) d.classList.add('marcado'); g.appendChild(d); });
    updateProg();
  }
  function paintPills(){
    var pills=document.getElementById('drawnPills'); if(!pills) return; pills.innerHTML='';
    drawn.slice(-14).reverse().forEach(function(n){ var p=document.createElement('div'); p.className='pill'+(myCard.includes(n)?' mine':''); p.textContent=n; pills.appendChild(p); });
    if(drawn.length){ var b=document.getElementById('currentBall'); if(b){ b.textContent=drawn[drawn.length-1]; b.className='ball'; } }
  }
  function loadState(){
    API.bingo.state().then(function(d){
      if(d.game && d.game.status==='running'){
        gameStarted=true; drawn=(d.game.drawn||[]).slice();
        var bs=document.getElementById('btnStart'); if(bs) bs.disabled=true;
        var bd=document.getElementById('btnDraw'); if(bd) bd.disabled=!isOperator;
        var st=document.getElementById('statusTxt'); if(st) st.textContent=drawn.length+'/75 sorteados';
        buildAllGrid(); drawn.forEach(function(n){ var ag=document.getElementById('ag_'+n); if(ag) ag.classList.add('drawn'); });
        if(d.card){ marked=new Set(); renderCardGrid(d.card); }
        else if(!IS_GUEST_BINGO){ API.bingo.card().then(function(c){ marked=new Set(); renderCardGrid(c.card); }).catch(function(){}); }
        paintPills();
      }
    }).catch(function(){});
  }
  tcSocket.on('bingo_started', function(){
    drawn=[]; marked=new Set(); gameStarted=true;
    var bs=document.getElementById('btnStart'); if(bs) bs.disabled=true;
    var bd=document.getElementById('btnDraw'); if(bd) bd.disabled=!isOperator;
    var dp=document.getElementById('drawnPills'); if(dp) dp.innerHTML='';
    var cb=document.getElementById('currentBall'); if(cb){ cb.textContent='?'; cb.className='ball'; }
    var st=document.getElementById('statusTxt'); if(st) st.textContent='Em andamento';
    var bb=document.getElementById('bingoBtn'); if(bb) bb.style.display='none';
    buildAllGrid();
    if(!IS_GUEST_BINGO){ API.bingo.card().then(function(c){ marked=new Set(); renderCardGrid(c.card); }).catch(function(){}); }
    sysMsg('🎱 Novo jogo de bingo iniciado!');
  });
  tcSocket.on('bingo_draw', function(d){ drawn=(d.drawn||[]).slice(); renderDraw(d.n); });
  tcSocket.on('bingo_winner', function(d){ if(typeof endGame==='function'){ gameStarted=true; endGame(d.winner===ME.nick?'Você':d.winner); } });
  tcSocket.on('bingo_reset', function(){ if(typeof resetLocalUI==='function') resetLocalUI(); sysMsg('🔄 Jogo reiniciado pelo operador.'); });
  tcSocket.on('connected', function(){ tcSocket.join('bingo'); setTimeout(loadState,300); });
  tcSocket.on('error', function(d){ if(d&&d.message&&typeof showToast==='function') showToast(d.message); });

  // staff = operador (o servidor valida de qualquer forma)
  if(['admin','supervisor','mod'].indexOf(ME.role)>=0){
    isOperator=true; isAdmin=true;
    if(typeof updateBadge==='function') updateBadge();
    try{ document.getElementById('opStrip').classList.add('show'); }catch(e){}
    try{ var _bo=document.getElementById('btnOpPanel'); if(_bo) _bo.style.display=''; }catch(e){}
  }

  if(tcSocket.connected){ tcSocket.join('bingo'); setTimeout(loadState,300); } else tcSocket.connect();
})();
</script>
