<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Supremo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#dce8f5;--surface:#fff;--surface2:#e8f2ff;
      --border:#b8d0e8;--purple:#7c3aed;--purple2:#6d28d9;--purple3:#a78bfa;
      --blue:#2563eb;--blue2:#1d4ed8;
      --text:#0f1f3d;--text2:#374d6e;--text3:#7a90b0;
      --green:#10b981;--red:#ef4444;
      --radius:14px;
    }
    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,.1) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(37,99,235,.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 70%, rgba(124,58,237,.06) 0%, transparent 55%),
        var(--bg);
      z-index: 0;
    }
    /* Subtle floating particles */
    .particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events:none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--purple3);
      opacity: 0;
      animation: twinkle var(--d) var(--delay) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.6); }
      50%      { opacity: var(--op); transform: scale(1); }
    }
    .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap { animation: floatLogo 4s ease-in-out infinite; }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .logo-tag { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .logo-tag-line { display: inline-block; height: 1.5px; width: 28px; background: linear-gradient(to right, transparent, var(--purple3)); }
    .logo-tag-line.rev { background: linear-gradient(to left, transparent, var(--purple3)); }
    .logo-tag-text { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3.5px; text-transform: uppercase; color: var(--text2); }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(180,200,225,0.55);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 36px 28px;
      max-width: 480px;
      width: 92%;
      box-shadow: 0 8px 40px rgba(124,58,237,.12), 0 30px 80px rgba(0,0,0,.08);
      animation: slideUp .4s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }
    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa, #2563eb, #7c3aed);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-logo { display: flex; justify-content: center; margin-bottom: 20px; }
    .modal-logo img { width: 200px; height: 200px; object-fit: contain; border-radius: 16px; }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      color: var(--purple);
      margin-bottom: 18px;
    }
    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .rule-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      transition: background .2s;
    }
    .rule-item:hover { background: #d8ecff; }
    .rule-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .alert-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fee2e230;
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #991b1b;
      margin-bottom: 20px;
      line-height: 1.45;
    }
    .alert-icon { font-size: 15px; flex-shrink: 0; }
    .ban-warning {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--text3);
      margin-bottom: 20px;
      opacity: .85;
    }
    .modal-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin-bottom: 20px;
    }
    .btn-row { display: flex; gap: 12px; }
    .btn {
      flex: 1;
      padding: 13px 0;
      border: none;
      border-radius: 11px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, filter .2s;
      text-transform: uppercase;
    }
    .btn:active { transform: scale(.97); }
    .btn-accept {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,.3);
    }
    .btn-accept:hover { filter: brightness(1.1); box-shadow: 0 6px 24px rgba(124,58,237,.45); }
    .btn-decline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text3);
    }
    .btn-decline:hover { background: var(--surface2); border-color: var(--purple3); color: var(--purple); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="particles" id="particles"></div>

  <!-- Página de fundo -->
  <div class="page">
    <div class="logo-wrap">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:8px">
        <img src="chat-supremo-logo.png" alt="Chat Supremo" style="width:220px;height:220px;object-fit:contain;"/>
      </div>
      <div class="logo-tag" style="margin-top:4px">
        <span class="logo-tag-line"></span>
        <span class="logo-tag-text"></span>
        <span class="logo-tag-line rev"></span>
      </div>
    </div>
  </div>

  <!-- Modal de regras -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-logo">
        <img src="chat-supremo-logo.png" alt="Chat Supremo"/>
      </div>
      <h2> </h2>
      <ul class="rules-list">
        <li class="rule-item"><span class="rule-icon">❌</span> Proibido fazer spam</li>
        <li class="rule-item"><span class="rule-icon">❌</span> Proibido enviar imagens de menores</li>
        <li class="rule-item"><span class="rule-icon">❌</span> Proibido racismo ou qualquer tipo de preconceito</li>
        <li class="rule-item"><span class="rule-icon">❌</span> Proibido xingamentos e ofensas</li>
      </ul>
      <div class="alert-box">
        <span class="alert-icon">🚨</span>
        <span>Denuncie pedofilia para a equipe tomar providências.</span>
      </div>
      <div class="modal-divider"></div>
      <p class="ban-warning">O descumprimento pode resultar em banimento imediato.</p>
      <div class="btn-row">
        <button class="btn btn-decline" onclick="decline()">Não aceito</button>
        <button class="btn btn-accept" onclick="accept()">Aceito</button>
      </div>
    </div>
  </div>

  <script>
    // Floating particles
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'particle';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `
        width:${size}px;height:${size}px;
        top:${Math.random()*100}%;left:${Math.random()*100}%;
        --d:${(Math.random()*5+3).toFixed(1)}s;
        --delay:-${(Math.random()*7).toFixed(1)}s;
        --op:${(Math.random()*.35+.1).toFixed(2)};
      `;
      particlesEl.appendChild(s);
    }
    function accept() {
      document.getElementById('overlay').style.animation = 'fadeOut .3s forwards';
      setTimeout(() => { window.location.href = 'login.html'; }, 300);
    }
    function decline() {
      document.getElementById('overlay').style.animation = 'fadeOut .3s forwards';
      setTimeout(() => { window.location.reload(); }, 300);
    }
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeOut { to { opacity:0; } }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
